name: Publish note from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  publish:
    if: github.event.issue.user.login == 'Bakuma-sea' && contains(github.event.issue.labels.*.name, 'publish-note')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate post from issue
        id: note
        run: node scripts/publish-note-from-issue.mjs

      - name: Commit post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/posts
          if git diff --cached --quiet; then
            echo "No post changes to commit."
            exit 0
          fi
          git commit -m "Publish note from issue #${{ github.event.issue.number }}"
          git push origin main

      - name: Comment and close issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          POST_PATH: ${{ steps.note.outputs.path }}
          POST_URL: ${{ steps.note.outputs.url }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "已发布到博客：${POST_URL}\n\n文件路径：\`${POST_PATH}\`"
          gh issue close "$ISSUE_NUMBER" --comment "自动发布完成。"
